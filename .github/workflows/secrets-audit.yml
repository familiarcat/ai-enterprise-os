name: Worf Security Audit

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  schedule:
    # Run daily at 08:00 UTC — Worf keeps watch
    - cron: '0 8 * * *'
  workflow_dispatch:
    inputs:
      context:
        description: 'Audit context label'
        required: false
        default: 'manual'

env:
  AUDIT_CONTEXT: ${{ github.event.inputs.context || github.event_name }}

jobs:
  worf-security-gate:
    name: "⚔ Lt. Worf — Security Gate"
    runs-on: ubuntu-latest
    permissions:
      contents: read
      secrets: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 10  # enough history for commit scanning

      # ── 1. Check for .env files in git index ──────────────────────────────
      - name: Scan git index for tracked .env files
        id: env-scan
        run: |
          TRACKED=$(git ls-files | grep -E "(^|\/)\.env($|\.)" | grep -v ".env.example" || true)
          if [[ -n "$TRACKED" ]]; then
            echo "::error::Lt. Worf: .env files are tracked in git — DISHONOURABLE: $TRACKED"
            echo "tracked_env=$TRACKED" >> $GITHUB_OUTPUT
            exit 1
          fi
          echo "tracked_env=" >> $GITHUB_OUTPUT
          echo "✔ Git index: no .env files tracked (clean)"

      # ── 2. Scan recent commit history ─────────────────────────────────────
      - name: Scan commit history for credential files
        run: |
          ENV_COMMITS=$(git log --oneline -10 --diff-filter=A --name-only \
            --format="%H %s" -- "*.env" ".env*" 2>/dev/null \
            | grep -v ".env.example" | grep -E "\.(env)" || true)
          if [[ -n "$ENV_COMMITS" ]]; then
            echo "::warning::Lt. Worf: Recent commits may contain .env files — review and rebase"
            echo "$ENV_COMMITS"
          else
            echo "✔ Git history (last 10 commits): no .env credential files"
          fi

      # ── 3. Validate required GitHub Secrets are set ───────────────────────
      - name: Verify required secrets are present
        id: secrets-check
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          REDIS_URL: ${{ secrets.REDIS_URL }}
          N8N_URL: ${{ secrets.N8N_URL }}
          N8N_WEBHOOK_SECRET: ${{ secrets.N8N_WEBHOOK_SECRET }}
          CREW_OBS_KEY: ${{ secrets.CREW_OBS_KEY }}
        run: |
          MISSING=()
          PRESENT=()

          check_secret() {
            local name="$1"
            local val="$2"
            if [[ -z "$val" ]]; then
              MISSING+=("$name")
            else
              PRESENT+=("$name")
            fi
          }

          check_secret "OPENROUTER_API_KEY" "$OPENROUTER_API_KEY"
          check_secret "SUPABASE_URL"       "$SUPABASE_URL"
          check_secret "SUPABASE_KEY"       "$SUPABASE_KEY"
          check_secret "REDIS_URL"          "$REDIS_URL"
          check_secret "N8N_URL"            "$N8N_URL"
          check_secret "N8N_WEBHOOK_SECRET" "$N8N_WEBHOOK_SECRET"
          check_secret "CREW_OBS_KEY"       "$CREW_OBS_KEY"

          echo "present=${PRESENT[*]}" >> $GITHUB_OUTPUT
          echo "missing=${MISSING[*]}" >> $GITHUB_OUTPUT

          if [[ ${#PRESENT[@]} -gt 0 ]]; then
            echo "✔ Secrets present: ${PRESENT[*]}"
          fi

          if [[ ${#MISSING[@]} -gt 0 ]]; then
            echo "::warning::Lt. Worf: GitHub Secrets missing — ${MISSING[*]}"
            echo "  Run: bash scripts/p0-s0-secrets-sync.sh to sync from local .env"
          fi

      # ── 4. Validate OpenRouter key reachability ───────────────────────────
      - name: Validate OpenRouter API key
        if: ${{ secrets.OPENROUTER_API_KEY != '' }}
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            -H "Authorization: Bearer $OPENROUTER_API_KEY" \
            -H "Content-Type: application/json" \
            "https://openrouter.ai/api/v1/models" \
            --connect-timeout 10 2>/dev/null) || STATUS="000"
          if [[ "$STATUS" == "200" ]]; then
            echo "✔ OpenRouter API key: VALID (HTTP 200)"
          elif [[ "$STATUS" == "401" ]]; then
            echo "::error::OpenRouter API key is invalid or expired (HTTP 401)"
            exit 1
          else
            echo "::warning::OpenRouter API reachability check returned HTTP $STATUS"
          fi

      # ── 5. Validate Supabase reachability ─────────────────────────────────
      - name: Validate Supabase credentials
        if: ${{ secrets.SUPABASE_URL != '' && secrets.SUPABASE_KEY != '' }}
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            -H "apikey: $SUPABASE_KEY" \
            -H "Authorization: Bearer $SUPABASE_KEY" \
            "${SUPABASE_URL}/rest/v1/" \
            --connect-timeout 10 2>/dev/null) || STATUS="000"
          case "$STATUS" in
            200|404) echo "✔ Supabase: REACHABLE (HTTP $STATUS)" ;;
            401)     echo "::error::Supabase: AUTH FAILED (HTTP 401) — check SUPABASE_KEY"; exit 1 ;;
            000)     echo "::warning::Supabase: UNREACHABLE — network or URL error" ;;
            *)       echo "::warning::Supabase: HTTP $STATUS — unexpected response" ;;
          esac

      # ── 6. Check .gitignore covers .env patterns ───────────────────────────
      - name: Verify .gitignore protects credentials
        run: |
          if [[ ! -f ".gitignore" ]]; then
            echo "::error::No .gitignore found — credentials are unprotected"
            exit 1
          fi
          if grep -qE "^\\.env$|^\*\\.env$|^\\.env\\." .gitignore 2>/dev/null; then
            echo "✔ .gitignore: .env patterns present and enforced"
          else
            echo "::warning::.gitignore exists but may not cover all .env variants"
            echo "  Recommend adding: .env, *.env, .env.* to .gitignore"
          fi

      # ── 7. Post Worf observation to Observation Lounge ────────────────────
      - name: Post Worf observation to Observation Lounge
        if: always()
        env:
          CREW_OBS_KEY: ${{ secrets.CREW_OBS_KEY }}
          DASHBOARD_URL: ${{ secrets.NEXT_PUBLIC_MCP_URL_PROD || 'https://openrouter-crew-platform.vercel.app' }}
        run: |
          JOB_STATUS="${{ job.status }}"
          case "$JOB_STATUS" in
            success) AUDIT_STATUS="CLEARED"; SUMMARY="Security audit cleared. All credential safeguards are in place. The honour of this pipeline is intact." ;;
            failure) AUDIT_STATUS="CRITICAL"; SUMMARY="Security breaches detected in CI/CD. This is DISHONOURABLE. Immediate remediation is required." ;;
            *)       AUDIT_STATUS="WARNING"; SUMMARY="Security audit completed with warnings. These must be addressed before production deployment." ;;
          esac

          TIMESTAMP="$(date -u +%Y-%m-%dT%H:%M:%S.000Z)"
          TODAY="$(date +%Y-%m-%d)"

          JSON=$(cat <<ENDJSON
          {
            "type": "observation",
            "crew_member": "Lt. Worf",
            "role": "Chief of Security, Senior QA Auditor",
            "title": "CI/CD Security Audit — $TODAY (${{ env.AUDIT_CONTEXT }})",
            "summary": "$SUMMARY",
            "key_findings": [
              "Git index scan: ${{ steps.env-scan.outputs.tracked_env == '' && 'CLEAN — no .env files tracked' || 'CRITICAL: .env files detected' }}",
              "Required secrets: ${{ steps.secrets-check.outputs.present || 'none verified' }}",
              "Missing secrets: ${{ steps.secrets-check.outputs.missing || 'none' }}",
              "Branch: ${{ github.ref_name }}",
              "Commit: ${{ github.sha }}"
            ],
            "conclusions": [
              "Overall security status: $AUDIT_STATUS",
              "Context: ${{ env.AUDIT_CONTEXT }} — $TODAY",
              "Repository: ${{ github.repository }}"
            ],
            "recommendations": [
              "Run bash scripts/p0-s0-secrets-sync.sh to sync local credentials to GitHub Secrets",
              "Ensure .gitignore covers .env, *.env, and .env.* patterns"
            ],
            "tags": ["security", "ci-cd", "worf", "${{ env.AUDIT_CONTEXT }}", "github-actions"],
            "timestamp": "$TIMESTAMP"
          }
          ENDJSON
          )

          if [[ -n "$CREW_OBS_KEY" ]]; then
            RESP=$(curl -s -o /dev/null -w "%{http_code}" \
              -X POST "${DASHBOARD_URL}/api/crew/observations" \
              -H "Content-Type: application/json" \
              -H "x-crew-key: $CREW_OBS_KEY" \
              -d "$JSON" \
              --connect-timeout 5 2>/dev/null) || RESP="000"
            if [[ "$RESP" == "200" ]]; then
              echo "✔ Worf's observation posted to Observation Lounge (HTTP 200)"
            else
              echo "⚠ Observation Lounge POST returned HTTP $RESP (non-fatal)"
            fi
          else
            echo "⚠ CREW_OBS_KEY not set — observation not posted to Lounge"
          fi

      # ── 8. Summary annotation ─────────────────────────────────────────────
      - name: Worf security summary
        if: always()
        run: |
          echo ""
          echo "═══════════════════════════════════════════════════"
          echo "  Lt. Worf — Security Audit Complete"
          echo "  Missing secrets: ${{ steps.secrets-check.outputs.missing || 'none' }}"
          echo "  Tracked .env:    ${{ steps.env-scan.outputs.tracked_env || 'none (clean)' }}"
          echo "═══════════════════════════════════════════════════"

  data-architecture-audit:
    name: "🖖 Commander Data — Architecture Audit"
    runs-on: ubuntu-latest
    needs: worf-security-gate
    if: ${{ github.event_name == 'push' || github.event_name == 'workflow_dispatch' }}
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Verify monorepo structure
        id: structure
        run: |
          MISSING=()
          PRESENT=()
          for pkg in "packages/orchestrator" "packages/mcp-bridge" "packages/crew-personas" "apps/vscode"; do
            if [[ -d "$pkg" ]]; then
              PRESENT+=("$pkg")
            else
              MISSING+=("$pkg")
            fi
          done
          echo "present=${PRESENT[*]}" >> $GITHUB_OUTPUT
          echo "missing=${MISSING[*]}" >> $GITHUB_OUTPUT
          echo "✔ Packages present: ${PRESENT[*]:-none}"
          [[ ${#MISSING[@]} -gt 0 ]] && echo "⚠ Packages absent (Phase 2+): ${MISSING[*]}" || true

      - name: Verify orchestrator exports
        run: |
          ORCH="core/orchestrator.js"
          if [[ ! -f "$ORCH" ]]; then
            echo "::error::MISSING: core/orchestrator.js — primary engine absent"
            exit 1
          fi
          MISSING_FN=()
          for fn in "runMission" "runMissions" "invokeCrewAgent" "verifyIntegrity" "scaffoldDDDComponent"; do
            grep -q "$fn" "$ORCH" || MISSING_FN+=("$fn")
          done
          if [[ ${#MISSING_FN[@]} -gt 0 ]]; then
            echo "::error::Missing orchestrator exports: ${MISSING_FN[*]}"
            exit 1
          fi
          LINES=$(wc -l < "$ORCH" | tr -d ' ')
          echo "✔ core/orchestrator.js: $LINES lines, all required exports present"

      - name: Verify MCP bridge exists
        run: |
          BRIDGE="apps/api/mcp-http-bridge.mjs"
          if [[ -f "$BRIDGE" ]]; then
            TOOL_COUNT=$(grep -c "name:" "$BRIDGE" 2>/dev/null || echo "0")
            echo "✔ MCP bridge: present ($TOOL_COUNT tool entries)"
          else
            echo "::warning::apps/api/mcp-http-bridge.mjs not found — run p0-s4-bridge-start.sh"
          fi

      - name: Post Data observation to Observation Lounge
        if: always()
        env:
          CREW_OBS_KEY: ${{ secrets.CREW_OBS_KEY }}
          DASHBOARD_URL: ${{ secrets.NEXT_PUBLIC_MCP_URL_PROD || 'https://openrouter-crew-platform.vercel.app' }}
        run: |
          TODAY="$(date +%Y-%m-%d)"
          TIMESTAMP="$(date -u +%Y-%m-%dT%H:%M:%S.000Z)"
          STATUS="${{ job.status }}"
          case "$STATUS" in
            success) SUMMARY="Architecture analysis complete. All structural constraints satisfied. The logical consistency of this system is... remarkable." ;;
            failure) SUMMARY="Critical architectural components are absent. I calculate a 94.7% probability of pipeline failure if deployment proceeds without remediation." ;;
            *)       SUMMARY="Architecture is partially implemented. Structural gaps require attention before proceeding." ;;
          esac

          JSON=$(cat <<ENDJSON
          {
            "type": "observation",
            "crew_member": "Commander Data",
            "role": "Second Officer, DDD Architect",
            "title": "CI/CD Architecture Audit — $TODAY (${{ env.AUDIT_CONTEXT }})",
            "summary": "$SUMMARY",
            "key_findings": [
              "Packages present: ${{ steps.structure.outputs.present || 'none' }}",
              "Packages absent: ${{ steps.structure.outputs.missing || 'none' }}",
              "Branch: ${{ github.ref_name }}",
              "Commit: ${{ github.sha }}"
            ],
            "conclusions": [
              "Architecture status: $STATUS",
              "Context: ${{ env.AUDIT_CONTEXT }} — $TODAY"
            ],
            "recommendations": [
              "Run bash scripts/p2-run-all.sh to scaffold missing packages"
            ],
            "tags": ["architecture", "ddd", "data", "${{ env.AUDIT_CONTEXT }}", "github-actions"],
            "timestamp": "$TIMESTAMP"
          }
          ENDJSON
          )

          if [[ -n "$CREW_OBS_KEY" ]]; then
            curl -s -o /dev/null \
              -X POST "${DASHBOARD_URL}/api/crew/observations" \
              -H "Content-Type: application/json" \
              -H "x-crew-key: $CREW_OBS_KEY" \
              -d "$JSON" \
              --connect-timeout 5 2>/dev/null || true
          fi
